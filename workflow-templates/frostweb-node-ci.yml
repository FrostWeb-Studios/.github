name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  node:
    uses: FrostWeb-Studios/.github/.github/workflows/reusable-node-ci.yml@main
    with:
      node-version: "22"
      working-directory: "."
      typecheck-cmd: "npx tsc --noEmit"
      lint-cmd: ""
      test-cmd: "npm test --if-present"
      build-cmd: ""

  codeql:
    uses: FrostWeb-Studios/.github/.github/workflows/reusable-codeql.yml@main
    with:
      language: javascript-typescript
    permissions:
      actions: read
      contents: read
      security-events: write

  secret-scan:
    uses: FrostWeb-Studios/.github/.github/workflows/reusable-gitleaks.yml@main
    permissions:
      contents: read
