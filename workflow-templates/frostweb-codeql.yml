name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "27 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    uses: FrostWeb-Studios/.github/.github/workflows/reusable-codeql.yml@main
    with:
      language: ${{ matrix.language }}
