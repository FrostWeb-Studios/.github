name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  go:
    uses: FrostWeb-Studios/.github/.github/workflows/reusable-go-ci.yml@main
    with:
      go-version: "1.24"
      working-directory: "."
      needs-postgres: false

  codeql:
    uses: FrostWeb-Studios/.github/.github/workflows/reusable-codeql.yml@main
    with:
      language: go
    permissions:
      actions: read
      contents: read
      security-events: write

  secret-scan:
    uses: FrostWeb-Studios/.github/.github/workflows/reusable-gitleaks.yml@main
    permissions:
      contents: read
