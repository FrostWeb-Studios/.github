name: Reusable Gitleaks Secret Scan

on:
  workflow_call:
    inputs:
      fetch-depth:
        type: number
        default: 0
      gitleaks-version:
        type: string
        default: "8.21.2"
      fail-on-detection:
        type: boolean
        default: false
        description: "Default false — findings show in Summary + SARIF artifact but don't block PRs. Flip to true after triaging existing findings."

# Why this calls the gitleaks BINARY directly instead of gitleaks/gitleaks-action@v2:
# As of late 2024, gitleaks-action requires a paid GITLEAKS_LICENSE secret when run
# inside a GitHub Organization (see https://github.com/gitleaks/gitleaks-action).
# The underlying `gitleaks` binary stays MIT-licensed and free, so we install + run
# it ourselves.

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.fetch-depth }}
          persist-credentials: false

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION="${{ inputs.gitleaks-version }}"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks detect
        id: gitleaks
        run: |
          set -uo pipefail
          REPORT="gitleaks-report.sarif"
          gitleaks detect \
            --source . \
            --report-format sarif \
            --report-path "$REPORT" \
            --redact \
            --no-banner \
            --exit-code 1
          echo "exit=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: ${{ !inputs.fail-on-detection }}

      - name: Generate summary
        if: always()
        run: |
          {
            echo "## Gitleaks scan"
            echo ""
            if [ -s gitleaks-report.sarif ]; then
              FINDINGS=$(jq -r '.runs[0].results | length' gitleaks-report.sarif 2>/dev/null || echo "?")
              if [ "$FINDINGS" = "0" ]; then
                echo "✓ No secrets detected."
              else
                echo "⚠️ **${FINDINGS} potential secret(s) detected.**"
                echo ""
                echo "Download the SARIF report from the artifacts on this run for details."
              fi
            else
              echo "✓ No secrets detected (no report file produced)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SARIF report
        if: always() && hashFiles('gitleaks-report.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif
          if-no-files-found: ignore
