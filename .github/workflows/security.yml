name: Security

# Weekly + manual only. PR-time dependency-review still fires via the
# dedicated dependency-review block below (cheap; high signal).
# Aligned with the org-wide CI cleanup: codeql/gitleaks are too slow to
# fire per PR + per push.

on:
  schedule:
    - cron: "27 4 * * 1"
  workflow_dispatch:
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Semgrep omitted: this repo is workflow YAML + markdown — no SAST value.
# Gitleaks runs on the schedule. dependency-review only on PR.
jobs:
  secret-scan:
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    uses: FrostWeb-Studios/.github/.github/workflows/reusable-gitleaks.yml@0c9ded516572a76447533bb6a1dcc5f0551a0c5f # v1

  dependency-review:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    uses: FrostWeb-Studios/.github/.github/workflows/reusable-dependency-review.yml@0c9ded516572a76447533bb6a1dcc5f0551a0c5f # v1
    with:
      fail-on-severity: high
