name: Reusable Node CI

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "22"
      working-directory:
        type: string
        default: "."
      install-cmd:
        type: string
        default: "npm ci"
      post-install-cmd:
        type: string
        default: ""
        description: "Optional command after install (e.g., 'npx prisma generate')"
      typecheck-cmd:
        type: string
        default: ""
      lint-cmd:
        type: string
        default: ""
      test-cmd:
        type: string
        default: "npm test --if-present"
      build-cmd:
        type: string
        default: ""
      needs-gh-pkg-token:
        type: boolean
        default: false
        description: "If true, exports NODE_AUTH_TOKEN=GH_PKG_TOKEN to npm install"
    secrets:
      GH_PKG_TOKEN:
        required: false

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json
      - name: Install
        run: ${{ inputs.install-cmd }}
        env:
          NODE_AUTH_TOKEN: ${{ inputs.needs-gh-pkg-token && secrets.GH_PKG_TOKEN || '' }}
      - name: Post-install
        if: inputs.post-install-cmd != ''
        run: ${{ inputs.post-install-cmd }}
      - name: Type check
        if: inputs.typecheck-cmd != ''
        run: ${{ inputs.typecheck-cmd }}
      - name: Lint
        if: inputs.lint-cmd != ''
        run: ${{ inputs.lint-cmd }}
      - name: Test
        if: inputs.test-cmd != ''
        run: ${{ inputs.test-cmd }}
      - name: Build
        if: inputs.build-cmd != ''
        run: ${{ inputs.build-cmd }}
