name: Reusable Auto-Complete PR on Issue Close

on:
  workflow_call:
    inputs:
      merge-method:
        type: string
        default: squash
        description: "squash | merge | rebase"

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    steps:
      - name: Find and auto-merge linked PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"

          PR_NUM=$(gh pr list \
            --state open \
            --search "Closes #${ISSUE_NUM} in:body" \
            --json number -q '.[0].number' 2>/dev/null || echo "")

          if [ -z "$PR_NUM" ]; then
            PR_NUM=$(gh pr list \
              --state open \
              --json number,headRefName \
              -q ".[] | select(.headRefName | test(\"^${ISSUE_NUM}-\")) | .number" 2>/dev/null | head -1)
          fi

          if [ -z "$PR_NUM" ]; then
            echo "No open PR found linked to issue #${ISSUE_NUM}"
            exit 0
          fi

          echo "Found PR #${PR_NUM} linked to issue #${ISSUE_NUM}"

          gh pr ready "$PR_NUM" 2>/dev/null || true

          gh pr merge "$PR_NUM" --auto --${{ inputs.merge-method }} || {
            echo "Auto-merge could not be enabled. Branch protection or checks may need to pass first."
          }
