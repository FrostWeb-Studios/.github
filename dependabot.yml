# Dependabot config for THIS repo (FrostWeb-Studios/.github).
# Per-repo Dependabot configs live in each repo's own .github/dependabot.yml —
# see workflow-templates/frostweb-dependabot.yml for the org-recommended template.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: [dependencies, ci]
    open-pull-requests-limit: 5
