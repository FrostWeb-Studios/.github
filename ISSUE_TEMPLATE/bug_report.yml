name: Bug Report
description: Report a reproducible bug
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
        **Do not use this template for security vulnerabilities** — see [SECURITY.md](https://github.com/FrostWeb-Studios/.github/blob/main/SECURITY.md).
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: Numbered steps a maintainer can follow
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / Commit
      description: Tag, release, or commit SHA where this reproduces
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, engine version, browser, etc. as applicable
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste relevant logs or attach screenshots. Redact secrets and PII.
      render: shell
    validations:
      required: false
